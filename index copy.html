<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Monelite">
<title>Monelite</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-180.png">
<style>
:root{--green:#1A2B10;--cream:#E7E0CE;--bg:#F6F4EE;--card:#FFFFFF;--muted:#7A7A6E;
--red:#B3261E;--orange:#B45309;--ok:#2E7D32;--line:#E4E0D4}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:#1E1E17;
padding-bottom:calc(78px + env(safe-area-inset-bottom))}
header{position:sticky;top:0;background:var(--green);color:var(--cream);z-index:5;
padding:calc(14px + env(safe-area-inset-top)) 18px 14px}
header h1{font-size:22px;letter-spacing:.5px}
main{padding:14px;max-width:640px;margin:0 auto}
.card{background:var(--card);border-radius:14px;padding:14px;margin-bottom:14px;
box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card h3{font-size:13px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px}
.row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);gap:8px}
.row:last-child{border-bottom:none}
.row .sub{font-size:12px;color:var(--muted)}
.amount{font-weight:700;white-space:nowrap}
.green{color:var(--ok)}.red{color:var(--red)}.orange{color:var(--orange)}
.bar{height:6px;background:var(--line);border-radius:3px;margin-top:6px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--green);border-radius:3px}
.bar i.over{background:var(--red)}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.chip{background:var(--green);color:var(--cream);border:none;border-radius:20px;
padding:9px 15px;font-size:14px;font-weight:600}
.chip.alt{background:var(--cream);color:var(--green)}
button{font-family:inherit;cursor:pointer}
.xbtn{background:none;border:none;color:var(--muted);font-size:16px;padding:4px 8px}
nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--green);
padding:8px 4px calc(8px + env(safe-area-inset-bottom));z-index:5}
nav button{flex:1;background:none;border:none;color:#9DA88F;font-size:11px;font-weight:600}
nav button span{display:block;font-size:22px;margin-bottom:2px}
nav button.on{color:var(--cream)}
#sheetWrap{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:10;display:none;align-items:flex-end}
#sheetWrap.open{display:flex}
#sheet{background:var(--bg);width:100%;max-height:88vh;overflow-y:auto;border-radius:18px 18px 0 0;
padding:16px 16px calc(24px + env(safe-area-inset-bottom));max-width:640px;margin:0 auto}
#sheetHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
#sheetHead b{font-size:18px}
label{display:block;font-size:13px;color:var(--muted);margin:12px 0 4px}
input,select{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;
font-size:16px;background:var(--card);font-family:inherit}
input[type=range]{padding:0}
.btn{width:100%;padding:13px;border:none;border-radius:12px;background:var(--green);
color:var(--cream);font-size:16px;font-weight:700;margin-top:16px}
.btn.danger{background:var(--red)}
.btn.soft{background:var(--cream);color:var(--green)}
.badge{font-size:12px;font-weight:700;padding:3px 9px;border-radius:10px;display:inline-block}
.b-buy{background:#E3F1E4;color:var(--ok)}.b-wait{background:#FBEEDB;color:var(--orange)}
.b-skip{background:#F9E2E0;color:var(--red)}
.reason{font-size:13px;color:var(--muted);margin-top:5px;line-height:1.35}
.hbar{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:12px}
.hbar em{flex:0 0 92px;font-style:normal;color:var(--muted);text-align:right;
white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbar i{display:block;height:16px;background:var(--green);border-radius:4px;min-width:2px}
.hbar i.over{background:var(--red)}
.vwrap{display:flex;align-items:flex-end;gap:10px;height:120px;margin-top:10px}
.vcol{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;height:100%}
.vcol i{display:block;width:70%;background:var(--cream);border:1px solid var(--green);border-radius:4px 4px 0 0}
.vcol b{font-size:10px;color:var(--muted);margin-top:4px;font-weight:600}
.empty{color:var(--muted);font-size:14px;text-align:center;padding:16px 0}
.warn{font-size:12.5px;color:var(--red);margin-top:8px;line-height:1.4}
.note{font-size:12.5px;color:var(--muted);margin-top:8px;line-height:1.4}
</style>
</head>
<body>
<header><h1 id="hTitle">Monelite</h1></header>
<main id="view"></main>
<nav id="tabs"></nav>
<div id="sheetWrap"><div id="sheet">
  <div id="sheetHead"><b id="sheetTitle"></b><button class="xbtn" onclick="closeSheet()">✕</button></div>
  <div id="sheetBody"></div>
</div></div>

<script>
"use strict";
/* ================= state ================= */
const KEY="monelite-v1";
const uid=()=>Math.random().toString(36).slice(2,10);
const today=()=>new Date().toISOString().slice(0,10);
let state=null;
function load(){
  try{state=JSON.parse(localStorage.getItem(KEY))}catch(e){state=null}
  if(!state){
    state={settings:{savingsRate:0.10},categories:[],expenses:[],income:[],debts:[],goals:[],wishlist:[]};
    const defs=[["Rent / Housing","essential","🏠",1500],["Groceries","essential","🧺",400],
      ["Transport","essential","🚌",150],["Utilities","essential","⚡️",150],["Phone","essential","📱",60],
      ["Tuition & Fees","student","🎓",500],["Books & Supplies","student","📚",50],["Software","student","💻",30],
      ["Dining Out","lifestyle","🍽",200],["Entertainment","lifestyle","🎮",100],
      ["Subscriptions","lifestyle","🔁",50],["Shopping","lifestyle","🛍",150],["Personal Care","lifestyle","❤️",50]];
    defs.forEach(d=>state.categories.push({id:uid(),name:d[0],group:d[1],icon:d[2],cap:d[3]}));
    state.goals.push({id:uid(),name:"Emergency Fund",target:6000,saved:0,emergency:true});
    save();
  }
}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}

/* ================= helpers ================= */
const fmt=n=>(n<0?"-":"")+"$"+Math.abs(n).toLocaleString("en-US",{maximumFractionDigits:0});
const fmt2=n=>"$"+Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const esc=s=>String(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const num=v=>{const n=parseFloat(v);return isFinite(n)?n:0};
function sameMonth(d,ref){const a=new Date(d+"T12:00");return a.getMonth()===ref.getMonth()&&a.getFullYear()===ref.getFullYear()}
const inThisMonth=d=>sameMonth(d,new Date());
function inLastMonth(d){const r=new Date();r.setDate(1);r.setMonth(r.getMonth()-1);return sameMonth(d,r)}
const monthName=d=>d.toLocaleString("en-US",{month:"long",year:"numeric"});
const shortDate=d=>new Date(d+"T12:00").toLocaleString("en-US",{month:"short",day:"numeric"});
const cat=id=>state.categories.find(c=>c.id===id);

/* ================= money math (all deterministic) ================= */
function calc(){
  const income=state.income.filter(i=>inThisMonth(i.date)).reduce((s,i)=>s+i.amount,0);
  const needs=state.categories.filter(c=>c.group!=="lifestyle").reduce((s,c)=>s+c.cap,0);
  const lifestyle=state.categories.filter(c=>c.group==="lifestyle").reduce((s,c)=>s+c.cap,0);
  const active=state.debts.filter(d=>d.balance>0);
  const minimums=active.reduce((s,d)=>s+d.minPay,0);
  const totalDebt=active.reduce((s,d)=>s+d.balance,0);
  const rate=state.settings.savingsRate;
  const savingsCut=income*rate;
  const available=income-needs-minimums-savingsCut;
  const lifestyleSpendable=Math.min(lifestyle,Math.max(available,0));
  const surplus=Math.max(available-lifestyleSpendable,0);
  const spent=state.expenses.filter(e=>inThisMonth(e.date)).reduce((s,e)=>s+e.amount,0);
  return {income,needs,lifestyle,minimums,totalDebt,rate,savingsCut,available,lifestyleSpendable,surplus,spent,hasDebt:totalDebt>0};
}
const spentIn=cid=>state.expenses.filter(e=>inThisMonth(e.date)&&e.catId===cid).reduce((s,e)=>s+e.amount,0);

function payoff(balance,apr,payment){
  if(balance<=0)return{months:0,interest:0};
  if(payment<=0)return{months:null,interest:0};
  const r=apr/100/12;
  if(r<=0)return{months:Math.ceil(balance/payment),interest:0};
  if(payment<=balance*r)return{months:null,interest:0};
  const n=Math.log(payment/(payment-balance*r))/Math.log(1+r);
  return{months:Math.ceil(n),interest:Math.max(payment*n-balance,0)};
}

/* ================= rule advisor ================= */
function advise(price){
  const c=calc();
  if(c.income<=0)return{verdict:"wait",months:1,reason:"Log this month's income first so I can judge affordability."};
  const surplus=Math.max(c.income-c.needs-c.minimums-c.savingsCut-c.lifestyle,0);
  const emergency=state.goals.find(g=>g.emergency);
  const funded=emergency&&emergency.target>0&&emergency.saved>=emergency.target;
  const th=c.hasDebt?0.25:(funded?1.0:0.5);
  if(surplus>0&&price<=surplus*th)
    return{verdict:"buyNow",months:0,reason:`It fits: ${fmt(price)} is within your ${fmt(surplus)} monthly surplus`+(c.hasDebt?" even while paying down debt.":".")};
  if(surplus>0){
    const m=Math.ceil(price/(surplus*th));
    if(m<=12)return{verdict:"wait",months:m,reason:c.hasDebt
      ?`Debt comes first — set aside a slice of your ${fmt(surplus)} surplus and it's yours in ${m} month${m===1?"":"s"}.`
      :`Save toward it from your ${fmt(surplus)} surplus — affordable in ${m} month${m===1?"":"s"}.`};
    return{verdict:"skip",months:0,reason:`At ${fmt(price)} it would take over a year of surplus — skip it or revisit after your debt is gone.`};
  }
  return{verdict:"skip",months:0,reason:"Your budget has no monthly surplus right now — bills, debt, and savings eat it all. Skip for now."};
}
function evalWish(w){
  const r=advise(w.price);
  w.verdict=r.verdict;w.reason=r.reason;
  if(r.months>0){const d=new Date();d.setMonth(d.getMonth()+r.months);
    w.when=d.toLocaleString("en-US",{month:"short",year:"numeric"});}else w.when="";
  save();
}

/* ================= tabs ================= */
const TABS=[["dash","📊","Dashboard"],["exp","🛒","Expenses"],["wish","✨","Wishlist"],["debt","💳","Debts"],["save","🏦","Savings"]];
let tab="dash";
function drawTabs(){
  document.getElementById("tabs").innerHTML=TABS.map(t=>
    `<button class="${tab===t[0]?"on":""}" onclick="go('${t[0]}')"><span>${t[1]}</span>${t[2]}</button>`).join("");
}
function go(t){tab=t;render()}
function render(){
  drawTabs();
  document.getElementById("hTitle").textContent=
    tab==="dash"?monthName(new Date()):TABS.find(x=>x[0]===tab)[2];
  ({dash:rDash,exp:rExp,wish:rWish,debt:rDebt,save:rSave})[tab]();
}

/* ================= dashboard ================= */
function rDash(){
  const c=calc();
  let h=`<div class="chips">
    <button class="chip" onclick="incomeSheet()">💵 Income</button>
    <button class="chip alt" onclick="catSheet()">🗂 Categories</button>
    <button class="chip alt" onclick="reviewSheet()">🕗 Review</button>
    <button class="chip alt" onclick="backupSheet()">💾 Backup</button></div>`;
  h+=`<div class="card">
    <div class="row"><span>Income this month</span><span class="amount green">${fmt(c.income)}</span></div>
    <div class="row"><span>Spent this month</span><span class="amount red">${fmt(c.spent)}</span></div>
    ${c.totalDebt>0?`<div class="row"><span>Total debt remaining</span><span class="amount orange">${fmt(c.totalDebt)}</span></div>`:""}
  </div>`;
  h+=`<div class="card"><h3>Suggested plan this month</h3>`;
  if(c.income<=0)h+=`<div class="empty">Log this month's income to see your plan.</div>`;
  else{
    const plan=[["1. Bills & essentials",c.needs],["2. Debt minimums",c.minimums],
      [`3. Savings (${Math.round(c.rate*100)}%)`,c.savingsCut],["4. Lifestyle spendable",c.lifestyleSpendable]];
    if(c.surplus>0)plan.push([c.hasDebt?"5. Extra to debt payoff":"5. Extra to savings 🎉",c.surplus]);
    h+=plan.map(p=>`<div class="row"><span>${p[0]}</span><span class="amount">${fmt(p[1])}</span></div>`).join("");
    if(c.available<0)h+=`<div class="warn">⚠️ Planned bills + minimums + savings exceed income by ${fmt(-c.available)}. Trim category caps or the savings rate.</div>`;
  }
  h+=`</div><div class="card"><h3>Categories</h3>`;
  h+=state.categories.map(g=>{
    const u=spentIn(g.id),over=u>g.cap,pct=Math.min(u/Math.max(g.cap,1),1)*100;
    return `<div style="padding:7px 0">
      <div style="display:flex;justify-content:space-between;font-size:14.5px">
        <span>${g.icon} ${esc(g.name)}</span>
        <span><b class="${over?"red":""}">${fmt(u)}</b> <span class="sub">/ ${fmt(g.cap)}</span></span></div>
      <div class="bar"><i class="${over?"over":""}" style="width:${pct}%"></i></div></div>`;
  }).join("");
  h+=`</div>`;
  document.getElementById("view").innerHTML=h;
}

/* ================= expenses ================= */
function rExp(){
  const list=state.expenses.filter(e=>inThisMonth(e.date)).sort((a,b)=>b.date.localeCompare(a.date));
  let h=`<div class="chips"><button class="chip" onclick="addExpSheet()">＋ Add expense</button></div><div class="card">`;
  h+=list.length?list.map(e=>{const g=cat(e.catId);
    return `<div class="row"><span>${g?g.icon:"❓"} ${g?esc(g.name):"Uncategorized"}
      <div class="sub">${shortDate(e.date)}${e.note?" · "+esc(e.note):""}</div></span>
      <span class="amount">${fmt2(e.amount)}</span>
      <button class="xbtn" onclick="delExp('${e.id}')">✕</button></div>`;}).join("")
    :`<div class="empty">No expenses yet — tap ＋ to log one.</div>`;
  h+=`</div>`;
  document.getElementById("view").innerHTML=h;
}
function delExp(id){state.expenses=state.expenses.filter(e=>e.id!==id);save();render()}
function addExpSheet(){
  openSheet("Add Expense",`
    <label>Amount</label><input id="f_amt" type="number" inputmode="decimal" placeholder="0.00">
    <label>Category</label><select id="f_cat">${state.categories.map(c=>`<option value="${c.id}">${c.icon} ${esc(c.name)}</option>`).join("")}</select>
    <label>Note (optional)</label><input id="f_note">
    <label>Date</label><input id="f_date" type="date" value="${today()}">
    <button class="btn" onclick="saveExp()">Save</button>`);
}
function saveExp(){
  const a=num(v("f_amt"));if(a<=0)return;
  state.expenses.push({id:uid(),amount:a,catId:v("f_cat"),note:v("f_note"),date:v("f_date")||today()});
  save();closeSheet();render();
}

/* ================= income ================= */
function incomeSheet(){
  const list=state.income.filter(i=>inThisMonth(i.date)).sort((a,b)=>b.date.localeCompare(a.date));
  const total=list.reduce((s,i)=>s+i.amount,0);
  openSheet("Income — "+monthName(new Date()),`
    <div class="card"><div class="row"><span>Total this month</span><span class="amount green">${fmt(total)}</span></div></div>
    <div class="card">${list.length?list.map(i=>`<div class="row"><span>${esc(i.source)}<div class="sub">${shortDate(i.date)}</div></span>
      <span class="amount">${fmt2(i.amount)}</span><button class="xbtn" onclick="delInc('${i.id}')">✕</button></div>`).join("")
      :`<div class="empty">Nothing logged yet.</div>`}</div>
    <label>Amount</label><input id="f_amt" type="number" inputmode="decimal">
    <label>Source</label><input id="f_src" placeholder="Salary, tutoring…">
    <label>Date</label><input id="f_date" type="date" value="${today()}">
    <button class="btn" onclick="saveInc()">Add income</button>`);
}
function saveInc(){
  const a=num(v("f_amt"));if(a<=0||!v("f_src"))return;
  state.income.push({id:uid(),amount:a,source:v("f_src"),date:v("f_date")||today()});
  save();incomeSheet();render();
}
function delInc(id){state.income=state.income.filter(i=>i.id!==id);save();incomeSheet();render()}

/* ================= categories ================= */
function catSheet(){
  const groups=[["essential","Essentials"],["student","Student"],["lifestyle","Lifestyle"]];
  openSheet("Categories",groups.map(g=>`<div class="card"><h3>${g[1]}</h3>
    ${state.categories.filter(c=>c.group===g[0]).map(c=>`<div class="row" onclick="editCatSheet('${c.id}')">
      <span>${c.icon} ${esc(c.name)}</span><span class="amount sub">${fmt(c.cap)}</span></div>`).join("")}
    </div>`).join("")+`<button class="btn" onclick="editCatSheet('')">＋ New category</button>`);
}
function editCatSheet(id){
  const c=id?cat(id):null;
  openSheet(c?"Edit Category":"New Category",`
    <label>Name</label><input id="f_name" value="${c?esc(c.name):""}">
    <label>Monthly cap</label><input id="f_cap" type="number" inputmode="decimal" value="${c?c.cap:""}">
    <label>Group</label><select id="f_grp">
      <option value="essential" ${c&&c.group==="essential"?"selected":""}>Essentials</option>
      <option value="student" ${c&&c.group==="student"?"selected":""}>Student</option>
      <option value="lifestyle" ${!c||c.group==="lifestyle"?"selected":""}>Lifestyle</option></select>
    <button class="btn" onclick="saveCat('${id}')">Save</button>
    ${c?`<button class="btn danger" onclick="delCat('${id}')">Delete category</button>`:""}`);
}
function saveCat(id){
  const name=v("f_name");if(!name)return;
  if(id){const c=cat(id);c.name=name;c.cap=num(v("f_cap"));c.group=v("f_grp")}
  else state.categories.push({id:uid(),name,group:v("f_grp"),icon:"🏷",cap:num(v("f_cap"))});
  save();catSheet();render();
}
function delCat(id){
  state.expenses.forEach(e=>{if(e.catId===id)e.catId=null});
  state.categories=state.categories.filter(c=>c.id!==id);save();catSheet();render();
}

/* ================= wishlist ================= */
function rWish(){
  const P=state.wishlist.filter(w=>w.status==="wishlist");
  const done=state.wishlist.filter(w=>w.status==="purchased");
  const gone=state.wishlist.filter(w=>w.status==="dismissed");
  const badge=w=>w.verdict==="buyNow"?`<span class="badge b-buy">✅ Buy now</span>`
    :w.verdict==="wait"?`<span class="badge b-wait">⏳ Wait — ${w.when}</span>`
    :w.verdict==="skip"?`<span class="badge b-skip">❌ Skip</span>`:"";
  let h=`<div class="chips"><button class="chip" onclick="addWishSheet()">＋ Add item</button>
    ${P.length?`<button class="chip alt" onclick="reEvalAll()">↻ Re-evaluate all</button>`:""}</div>`;
  h+=`<div class="card"><h3>Wishlist</h3>`;
  h+=P.length?P.map(w=>`<div style="padding:9px 0;border-bottom:1px solid var(--line)">
      <div style="display:flex;justify-content:space-between"><b>${esc(w.name)}</b><span class="amount">${fmt(w.price)}</span></div>
      <div style="margin-top:5px">${badge(w)}</div>
      ${w.reason?`<div class="reason">${esc(w.reason)}</div>`:""}
      <div class="chips" style="margin:9px 0 0">
        <button class="chip" style="padding:6px 12px;font-size:13px" onclick="buyWish('${w.id}')">✓ Purchased</button>
        <button class="chip alt" style="padding:6px 12px;font-size:13px" onclick="dropWish('${w.id}')">👋 Let go</button>
        <button class="chip alt" style="padding:6px 12px;font-size:13px" onclick="reEval('${w.id}')">↻</button>
      </div></div>`).join("")
    :`<div class="empty">Add something you're thinking about buying — you'll get an instant verdict.</div>`;
  h+=`</div>`;
  if(done.length)h+=`<div class="card"><h3>Purchased ✅</h3>${done.map(w=>
    `<div class="row"><span style="text-decoration:line-through">${esc(w.name)}</span><span class="sub">${fmt(w.price)}</span></div>`).join("")}</div>`;
  if(gone.length)h+=`<div class="card"><h3>Let go 👋</h3>${gone.map(w=>
    `<div class="row"><span class="sub" style="text-decoration:line-through">${esc(w.name)}</span></div>`).join("")}</div>`;
  document.getElementById("view").innerHTML=h;
}
function addWishSheet(){
  openSheet("Add to Wishlist",`
    <label>What is it?</label><input id="f_name">
    <label>Price</label><input id="f_price" type="number" inputmode="decimal">
    <label>Why do you want it? (optional)</label><input id="f_note">
    <button class="btn" onclick="saveWish()">Save & get verdict</button>`);
}
function saveWish(){
  const name=v("f_name"),price=num(v("f_price"));if(!name||price<=0)return;
  const w={id:uid(),name,price,note:v("f_note"),added:today(),status:"wishlist",verdict:"",reason:"",when:""};
  evalWish(w);state.wishlist.push(w);save();closeSheet();render();
}
function reEval(id){const w=state.wishlist.find(x=>x.id===id);evalWish(w);render()}
function reEvalAll(){state.wishlist.filter(w=>w.status==="wishlist").forEach(evalWish);render()}
function buyWish(id){
  const w=state.wishlist.find(x=>x.id===id);w.status="purchased";
  const shop=state.categories.find(c=>/shopping/i.test(c.name))||state.categories.find(c=>c.group==="lifestyle");
  state.expenses.push({id:uid(),amount:w.price,catId:shop?shop.id:null,note:w.name,date:today()});
  save();render();
}
function dropWish(id){state.wishlist.find(x=>x.id===id).status="dismissed";save();render()}

/* ================= debts ================= */
function rDebt(){
  const act=state.debts.filter(d=>d.balance>0).sort((a,b)=>b.apr-a.apr);
  const paid=state.debts.filter(d=>d.balance<=0);
  const total=act.reduce((s,d)=>s+d.balance,0);
  let h=`<div class="chips"><button class="chip" onclick="editDebtSheet('')">＋ Add debt</button></div>`;
  if(act.length){
    h+=`<div class="card"><div class="row"><span>Total remaining</span><span class="amount orange">${fmt(total)}</span></div>
      <div class="note">Listed highest interest first — pay extra on the top one (avalanche method).</div></div>`;
    h+=`<div class="card"><h3>Active</h3>`+act.map(d=>{
      const pct=d.principal>0?Math.min(Math.max((d.principal-d.balance)/d.principal,0),1)*100:0;
      return `<div style="padding:9px 0" onclick="debtSheet('${d.id}')">
        <div style="display:flex;justify-content:space-between"><b>${esc(d.name)}</b><span class="amount">${fmt(d.balance)}</span></div>
        <div class="sub">${esc(d.lender)}${d.apr>0?" · "+d.apr+"% APR":""}${d.dueDay>0?" · due day "+d.dueDay:""}</div>
        <div class="bar"><i style="width:${pct}%;background:var(--ok)"></i></div></div>`;}).join("")+`</div>`;
  } else h+=`<div class="card"><div class="empty">No debts tracked — tap ＋ to add your loans.</div></div>`;
  if(paid.length)h+=`<div class="card"><h3>Paid off 🎉</h3>${paid.map(d=>
    `<div class="row" onclick="debtSheet('${d.id}')"><span style="text-decoration:line-through">${esc(d.name)}</span></div>`).join("")}</div>`;
  document.getElementById("view").innerHTML=h;
}
function editDebtSheet(id){
  const d=id?state.debts.find(x=>x.id===id):null;
  openSheet(d?"Edit Debt":"New Debt",`
    <label>Name</label><input id="f_name" value="${d?esc(d.name):""}" placeholder="Dad — car loan">
    <label>Lender</label><input id="f_lender" value="${d?esc(d.lender):""}" placeholder="Dad, Chase…">
    <label>Amount owed now</label><input id="f_bal" type="number" inputmode="decimal" value="${d?d.balance:""}">
    <label>Original amount</label><input id="f_prin" type="number" inputmode="decimal" value="${d?d.principal:""}">
    <label>Interest rate % APR (0 for family loans)</label><input id="f_apr" type="number" inputmode="decimal" value="${d?d.apr:"0"}">
    <label>Minimum payment / month</label><input id="f_min" type="number" inputmode="decimal" value="${d?d.minPay:""}">
    <label>Due day of month (0 = none)</label><input id="f_due" type="number" inputmode="numeric" value="${d?d.dueDay:"0"}">
    <button class="btn" onclick="saveDebt('${id}')">Save</button>
    ${d?`<button class="btn danger" onclick="delDebt('${id}')">Delete this debt</button>`:""}`);
}
function saveDebt(id){
  const name=v("f_name");if(!name)return;
  const bal=num(v("f_bal"));
  const fields={name,lender:v("f_lender"),balance:bal,
    principal:num(v("f_prin"))||bal,apr:num(v("f_apr")),minPay:num(v("f_min")),
    dueDay:Math.min(Math.max(Math.round(num(v("f_due"))),0),28)};
  if(id)Object.assign(state.debts.find(x=>x.id===id),fields);
  else state.debts.push(Object.assign({id:uid(),payments:[]},fields));
  save();closeSheet();render();
}
function delDebt(id){
  if(!confirm("Delete this debt and its payment history?"))return;
  state.debts=state.debts.filter(d=>d.id!==id);save();closeSheet();render();
}
function debtSheet(id){
  const d=state.debts.find(x=>x.id===id);
  const pays=[...d.payments].sort((a,b)=>b.date.localeCompare(a.date));
  openSheet(esc(d.name),`
    <div class="card">
      <div class="row"><span>Balance</span><span class="amount">${fmt2(d.balance)}</span></div>
      <div class="row"><span>Minimum / mo</span><span class="amount">${fmt2(d.minPay)}</span></div>
      <div class="row"><span>Interest</span><span class="amount">${d.apr}% APR</span></div>
    </div>
    ${d.balance>0?`<div class="card"><h3>Payoff projection</h3>
      <label>Extra per month</label><input id="f_extra" type="number" inputmode="decimal" value="0" oninput="proj('${id}')">
      <div id="projBox"></div></div>`:""}
    <div class="card"><h3>Payments</h3>
      <label>Log a payment</label><input id="f_pay" type="number" inputmode="decimal" value="${d.minPay}">
      <label>Date</label><input id="f_pdate" type="date" value="${today()}">
      <button class="btn" onclick="logPay('${id}')">Log payment</button>
      ${pays.map(p=>`<div class="row"><span>${shortDate(p.date)}</span><span class="amount">${fmt2(p.amount)}</span>
        <button class="xbtn" onclick="delPay('${id}','${p.id}')">✕</button></div>`).join("")}
    </div>
    <button class="btn soft" onclick="editDebtSheet('${id}')">Edit details</button>`);
  if(d.balance>0)proj(id);
}
function proj(id){
  const d=state.debts.find(x=>x.id===id);
  const extra=num(v("f_extra"));
  const p=payoff(d.balance,d.apr,d.minPay+extra);
  let h;
  if(p.months===null)h=`<div class="warn">⚠️ That payment doesn't cover the monthly interest — the balance would never shrink. Increase it.</div>`;
  else{
    const dt=new Date();dt.setMonth(dt.getMonth()+p.months);
    h=`<div class="row"><span>Debt-free</span><span class="amount green">${dt.toLocaleString("en-US",{month:"long",year:"numeric"})} (${p.months} mo)</span></div>`;
    if(d.apr>0){
      h+=`<div class="row"><span>Interest you'll pay</span><span class="amount">${fmt(p.interest)}</span></div>`;
      if(extra>0){const base=payoff(d.balance,d.apr,d.minPay);
        if(base.months!==null&&base.interest>p.interest)
          h+=`<div class="row"><span>Saved by paying extra</span><span class="amount green">${fmt(base.interest-p.interest)}</span></div>`;}
    }
  }
  document.getElementById("projBox").innerHTML=h;
}
function logPay(id){
  const d=state.debts.find(x=>x.id===id);
  const a=num(v("f_pay"));if(a<=0)return;
  d.payments.push({id:uid(),amount:a,date:v("f_pdate")||today()});
  d.balance=Math.max(0,d.balance-a);
  save();debtSheet(id);render();
}
function delPay(id,pid){
  const d=state.debts.find(x=>x.id===id);
  const p=d.payments.find(x=>x.id===pid);
  d.balance+=p.amount;d.payments=d.payments.filter(x=>x.id!==pid);
  save();debtSheet(id);render();
}

/* ================= savings ================= */
function rSave(){
  const total=state.goals.reduce((s,g)=>s+g.saved,0);
  let h=`<div class="card"><h3>Monthly auto-savings</h3>
    <input type="range" min="0" max="50" value="${Math.round(state.settings.savingsRate*100)}"
      oninput="setRate(this.value)">
    <div class="note"><b id="rateLbl">${Math.round(state.settings.savingsRate*100)}%</b> of each month's income is earmarked for savings before lifestyle spending. The Dashboard plan uses this.</div></div>`;
  h+=`<div class="card"><div class="row"><span>Total saved</span><span class="amount green">${fmt(total)}</span></div></div>`;
  h+=`<div class="chips"><button class="chip" onclick="addGoalSheet()">＋ New goal</button></div>`;
  h+=state.goals.map(g=>{
    const pct=g.target>0?Math.min(g.saved/g.target,1)*100:0;
    return `<div class="card"><div style="display:flex;justify-content:space-between">
      <b>${g.emergency?"🛟 ":""}${esc(g.name)}</b>
      <span class="sub">${fmt(g.saved)} / ${fmt(g.target)}</span></div>
      <div class="bar"><i style="width:${pct}%;background:${pct>=100?"var(--ok)":"var(--green)"}"></i></div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <input id="add_${g.id}" type="number" inputmode="decimal" placeholder="Amount" style="flex:1">
        <button class="chip" onclick="addToGoal('${g.id}')">Add</button>
        ${g.emergency?"":`<button class="xbtn" onclick="delGoal('${g.id}')">✕</button>`}
      </div></div>`;}).join("");
  document.getElementById("view").innerHTML=h;
}
function setRate(pc){state.settings.savingsRate=num(pc)/100;save();
  document.getElementById("rateLbl").textContent=Math.round(num(pc))+"%"}
function addToGoal(id){
  const g=state.goals.find(x=>x.id===id);
  const a=num(document.getElementById("add_"+id).value);
  if(a>0){g.saved+=a;save();render()}
}
function delGoal(id){if(confirm("Delete this goal?")){state.goals=state.goals.filter(g=>g.id!==id);save();render()}}
function addGoalSheet(){
  openSheet("New Goal",`
    <label>Name</label><input id="f_name" placeholder="New laptop">
    <label>Target amount</label><input id="f_target" type="number" inputmode="decimal">
    <button class="btn" onclick="saveGoal()">Save</button>`);
}
function saveGoal(){
  const name=v("f_name"),t=num(v("f_target"));if(!name||t<=0)return;
  state.goals.push({id:uid(),name,target:t,saved:0,emergency:false});
  save();closeSheet();render();
}

/* ================= monthly review ================= */
function reviewSheet(){
  const ref=new Date();ref.setDate(1);ref.setMonth(ref.getMonth()-1);
  const name=monthName(ref);
  const inc=state.income.filter(i=>inLastMonth(i.date)).reduce((s,i)=>s+i.amount,0);
  const spent=state.expenses.filter(e=>inLastMonth(e.date)).reduce((s,e)=>s+e.amount,0);
  const debtPaid=state.debts.flatMap(d=>d.payments).filter(p=>inLastMonth(p.date)).reduce((s,p)=>s+p.amount,0);
  const kept=inc-spent-debtPaid;
  const spends=state.categories.map(c=>({name:c.name,cap:c.cap,
      spent:state.expenses.filter(e=>inLastMonth(e.date)&&e.catId===c.id).reduce((s,e)=>s+e.amount,0)}))
    .filter(x=>x.spent>0).sort((a,b)=>b.spent-a.spent);
  const overs=spends.filter(x=>x.spent>x.cap);
  const maxSpend=Math.max(...spends.map(x=>x.spent),1);
  // 6-month trend
  const months=[];
  for(let k=5;k>=0;k--){const s=new Date();s.setDate(1);s.setMonth(s.getMonth()-k);
    months.push({label:s.toLocaleString("en-US",{month:"short"}),
      spent:state.expenses.filter(e=>sameMonth(e.date,s)).reduce((t,e)=>t+e.amount,0)});}
  const maxM=Math.max(...months.map(m=>m.spent),1);
  // commentary (rule-based)
  let talk;
  if(overs.length)talk=`You went over in ${overs.length} categor${overs.length===1?"y":"ies"} — biggest was ${overs[0].name} (+${fmt(overs[0].spent-overs[0].cap)}). Try trimming it this month; your debt payoff will thank you.`;
  else if(spent===0)talk="No expenses logged last month — log as you spend so this review means something.";
  else talk="Every category stayed under budget — solid month. Keep the momentum: put leftover cash toward your highest-interest debt.";
  openSheet(name+" Review",`
    <div class="card">
      <div class="row"><span>Income</span><span class="amount green">${fmt(inc)}</span></div>
      <div class="row"><span>Spent</span><span class="amount red">${fmt(spent)}</span></div>
      <div class="row"><span>Debt payments</span><span class="amount orange">${fmt(debtPaid)}</span></div>
      <div class="row"><span>${kept>=0?"Kept / saved":"Overspent by"}</span><span class="amount ${kept>=0?"green":"red"}">${fmt(Math.abs(kept))}</span></div>
    </div>
    ${spends.length?`<div class="card"><h3>Where it went</h3>${spends.slice(0,8).map(x=>
      `<div class="hbar"><em>${esc(x.name)}</em><i class="${x.spent>x.cap?"over":""}" style="width:${x.spent/maxSpend*60}%"></i><span>${fmt(x.spent)}</span></div>`).join("")}</div>`:""}
    ${overs.length?`<div class="card"><h3>Over budget</h3>${overs.map(x=>
      `<div class="row"><span>${esc(x.name)}</span><span class="amount red">+${fmt(x.spent-x.cap)}</span></div>`).join("")}</div>`:""}
    <div class="card"><h3>6-month spending</h3><div class="vwrap">${months.map(m=>
      `<div class="vcol"><i style="height:${m.spent/maxM*100}%"></i><b>${m.label}</b></div>`).join("")}</div></div>
    <div class="card"><h3>Advisor's take</h3><div style="font-size:14.5px;line-height:1.5">${talk}</div></div>`);
}

/* ================= backup ================= */
function backupSheet(){
  openSheet("Backup & Export",`
    <div class="note" style="margin-bottom:4px">Your data lives only in this browser. Export a backup now and then — especially before clearing Safari data or switching phones.</div>
    <button class="btn" onclick="exportJSON()">⬇️ Export all data (JSON)</button>
    <button class="btn soft" onclick="document.getElementById('impFile').click()">⬆️ Import a backup</button>
    <input id="impFile" type="file" accept=".json" style="display:none" onchange="importJSON(this)">
    <button class="btn soft" onclick="exportICS()">📅 Debt due dates → Calendar (.ics)</button>
    <div class="note">The .ics file adds repeating events to your iPhone Calendar, which <b>does</b> send reminders — that replaces the native app's due-date notifications.</div>`);
}
function download(name,text,type){
  const b=new Blob([text],{type});const a=document.createElement("a");
  a.href=URL.createObjectURL(b);a.download=name;a.click();
}
function exportJSON(){download("monelite-backup-"+today()+".json",JSON.stringify(state,null,1),"application/json")}
function importJSON(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{
    const s=JSON.parse(r.result);
    if(!s.categories||!s.settings)throw 0;
    state=s;save();closeSheet();render();alert("Backup restored.");
  }catch(e){alert("That file doesn't look like a Monelite backup.")}};
  r.readAsText(f);
}
function exportICS(){
  const due=state.debts.filter(d=>d.balance>0&&d.dueDay>0);
  if(!due.length){alert("No active debts with a due day set.");return}
  const now=new Date();
  let ics="BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Monelite//EN\r\n";
  due.forEach(d=>{
    let st=new Date(now.getFullYear(),now.getMonth(),d.dueDay);
    if(st<now)st.setMonth(st.getMonth()+1);
    const ymd=st.getFullYear()+String(st.getMonth()+1).padStart(2,"0")+String(st.getDate()).padStart(2,"0");
    ics+="BEGIN:VEVENT\r\nUID:"+d.id+"@monelite\r\nDTSTART;VALUE=DATE:"+ymd+
      "\r\nRRULE:FREQ=MONTHLY;BYMONTHDAY="+d.dueDay+
      "\r\nSUMMARY:"+d.name.replace(/[,;\\]/g," ")+" payment due ("+fmt(d.minPay)+")"+
      "\r\nBEGIN:VALARM\r\nTRIGGER:-P3D\r\nACTION:DISPLAY\r\nDESCRIPTION:Due in 3 days\r\nEND:VALARM\r\nEND:VEVENT\r\n";
  });
  ics+="END:VCALENDAR\r\n";
  download("monelite-due-dates.ics",ics,"text/calendar");
}

/* ================= sheet plumbing ================= */
const v=id=>document.getElementById(id).value.trim();
function openSheet(title,html){
  document.getElementById("sheetTitle").textContent=title;
  document.getElementById("sheetBody").innerHTML=html;
  document.getElementById("sheetWrap").classList.add("open");
}
function closeSheet(){document.getElementById("sheetWrap").classList.remove("open")}
document.getElementById("sheetWrap").addEventListener("click",e=>{if(e.target.id==="sheetWrap")closeSheet()});

/* ================= boot ================= */
load();render();
if("serviceWorker" in navigator && location.protocol==="https:")
  navigator.serviceWorker.register("./sw.js");
</script>
